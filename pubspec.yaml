name: heart_alert
description: Heart Alert - Medical App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.4
  file_picker: ^8.0.0
  http_parser: ^4.0.0
  http: ^1.1.0
  app_links: ^7.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  provider: ^6.1.5+1
  path_provider: ^2.1.5
  google_generative_ai: ^0.4.6
  uuid: ^4.3.3
  pdf: ^3.10.7
  printing: ^5.11.1
  open_file: ^3.3.2
  share_plus: ^7.2.1
  cached_network_image: ^3.3.0
  url_launcher: ^6.3.2
  intl_phone_number_input: ^0.7.0
  email_validator: ^2.1.17
  universal_io: ^2.2.0 
  country_flags: ^2.2.0
  flutter_dotenv: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# This section MUST be at the root level (same indentation as dependencies)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  # adaptive_icon_background: "#7A9E7E"
  # adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env